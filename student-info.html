<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Information</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bricol+Grotesque:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #16161f;
            --text-primary: #e8e8ed;
            --text-secondary: #8888a0;
            --accent: #00d4aa;
            --accent-secondary: #7c3aed;
            --border: #2a2a3a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Bricol Grotesque', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            line-height: 1.6;
            background-image:
                radial-gradient(ellipse at 20% 0%, rgba(124, 58, 237, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(0, 212, 170, 0.1) 0%, transparent 50%);
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeIn 0.8s ease-out;
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header .subtitle {
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            color: var(--text-secondary);
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            animation: slideUp 0.6s ease-out 0.2s both;
            position: relative;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent) 0%, var(--accent-secondary) 50%, var(--accent) 100%);
        }

        .card-header {
            background: var(--bg-secondary);
            padding: 2rem 2.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-secondary) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--bg-primary);
            flex-shrink: 0;
            box-shadow: 0 0 30px rgba(0, 212, 170, 0.3);
        }

        .student-info {
            flex: 1;
        }

        .student-name {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .student-id {
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            color: var(--accent);
            margin-top: 0.25rem;
            letter-spacing: 0.05em;
        }

        .card-body {
            padding: 2.5rem;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 2rem;
        }

        .info-group {
            animation: fadeIn 0.5s ease-out both;
            padding: 1rem;
            background: var(--bg-secondary);
            border-radius: 10px;
            border: 1px solid var(--border);
            transition: border-color 0.3s ease, transform 0.3s ease;
        }

        .info-group:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .info-group:nth-child(1) { animation-delay: 0.3s; }
        .info-group:nth-child(2) { animation-delay: 0.4s; }
        .info-group:nth-child(3) { animation-delay: 0.5s; }
        .info-group:nth-child(4) { animation-delay: 0.6s; }
        .info-group:nth-child(5) { animation-delay: 0.7s; }
        .info-group:nth-child(6) { animation-delay: 0.8s; }

        .info-label {
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .info-value {
            font-size: 1rem;
            font-weight: 500;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 1rem;
            background: rgba(0, 212, 170, 0.15);
            color: var(--accent);
            border-radius: 2rem;
            font-size: 0.85rem;
            font-weight: 500;
            border: 1px solid rgba(0, 212, 170, 0.3);
        }

        .status-badge::before {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 2.2rem;
            }

            .card-header {
                flex-direction: column;
                text-align: center;
            }

            .info-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Student Profile</h1>
            <p class="subtitle">Academic Record</p>
        </header>

        <div class="card">
            <div class="card-header">
                <div class="avatar">AK</div>
                <div class="student-info">
                    <h2 class="student-name">Ayush Kotadiya</h2>
                    <p class="student-id">ID: STU-2024-1847</p>
                </div>
            </div>
            <div class="card-body">
                <div class="info-grid">
                    <div class="info-group">
                        <p class="info-label">Program</p>
                        <p class="info-value">B.Tech Computer Science</p>
                    </div>
                    <div class="info-group">
                        <p class="info-label">Year</p>
                        <p class="info-value">Third Year</p>
                    </div>
                    <div class="info-group">
                        <p class="info-label">Email</p>
                        <p class="info-value">ayush.kotadiya@university.edu</p>
                    </div>
                    <div class="info-group">
                        <p class="info-label">GPA</p>
                        <p class="info-value">3.85 / 4.0</p>
                    </div>
                    <div class="info-group">
                        <p class="info-label">Expected Graduation</p>
                        <p class="info-value">May 2027</p>
                    </div>
                    <div class="info-group">
                        <p class="info-label">Status</p>
                        <span class="status-badge">Active</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
